; Engine bootstrap configuration
; In production, the engine compiler will embed these values into the build.

[Engine]
GL_VERSION_MAJOR = 3          ; Default OpenGL major version
GL_VERSION_MINOR = 3          ; Default OpenGL minor version
DISABLE_PHYSICS = false       ; Set to true if using a custom physics engine
ENGINE_PLATFORM = Windows     ; Supported: Windows, Linux, macOS

[Player]
RENDER_BACKEND = OpenGL       ; Rendering backend (cannot be changed at runtime)

[Deployment]
TARGET = JAR                  ; Build output type
COMPRESS = false              ; Enable if you want compressed assets
OBFUSCATE = false             ; Disable if using a custom obfuscator
PUBLISHER = ExampleCompany
DEVELOPER = ExampleDeveloper
VERSION = 1.0.0-SNAPSHOT      ; Standardized version format
